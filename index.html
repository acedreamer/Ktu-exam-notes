<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU ARCHIVE</title>

    <!-- Google Fonts: Playfair Display (display/headings) + Inter (body/UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN with form + container-query plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Tailwind Config: Editorial Minimalism design tokens -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        base: "var(--bg-base)",
                        surface: "var(--bg-surface)",
                        elevated: "var(--bg-elevated)",
                        border: "var(--border)",
                        primary: "var(--text-primary)",
                        secondary: "var(--text-secondary)",
                        muted: "var(--text-muted)",
                        "accent-blue": "var(--accent-blue)",
                        "accent-amber": "var(--accent-amber)",
                        "accent-purple": "var(--accent-purple)",
                        "accent-green": "var(--accent-green)",
                        "accent-red": "var(--accent-red)"
                    },
                    borderRadius: {
                        DEFAULT: "0px",
                        lg:      "0px",
                        xl:      "0px",
                        full:    "0px"
                    },
                    spacing: {
                        xs:              "4px",
                        sm:              "8px",
                        md:              "16px",
                        lg:              "24px",
                        xl:              "48px",
                        xxl:             "80px",
                        gutter:          "24px",
                        "margin-mobile": "16px",
                        "margin-desktop":"64px"
                    },
                    fontFamily: {
                        "display-branch": ["Playfair Display"],
                        "headline-lg":    ["Playfair Display"],
                        "headline-md":    ["Playfair Display"],
                        "body-lg":        ["Inter"],
                        "body-md":        ["Inter"],
                        "label-caps":     ["Inter"],
                        "code":           ["Inter"]
                    },
                    fontSize: {
                        "display-branch": ["120px", { lineHeight: "110%",  letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-lg":    ["48px",  { lineHeight: "1.2",   fontWeight: "700" }],
                        "headline-md":    ["32px",  { lineHeight: "1.3",   fontWeight: "600" }],
                        "body-lg":        ["18px",  { lineHeight: "1.6",   fontWeight: "400" }],
                        "body-md":        ["16px",  { lineHeight: "1.6",   fontWeight: "400" }],
                        "label-caps":     ["12px",  { lineHeight: "1.5",   letterSpacing: "0.12em", fontWeight: "600" }],
                        "code":           ["14px",  { lineHeight: "1.5",   fontWeight: "400" }]
                    }
                }
            }
        };
    </script>

    <script>
        // Immediately restore theme to prevent screen flashing
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        }
    </script>

    <!-- Project stylesheet (custom component styles, theme CSS-var overrides) -->
    <link rel="stylesheet" href="style.css">

    <!-- KaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body class="font-body-md text-body-md overflow-x-hidden bg-base text-primary">

    <!-- ============================================================
         1. FIXED TOP NAVBAR
         Pinned at the very top of the viewport, full width, z-50.
         ============================================================ -->
    <header class="fixed top-0 left-0 w-full h-16 z-50 bg-base border-b border-border px-margin-mobile lg:pl-margin-mobile lg:pr-margin-desktop flex items-center justify-between">

        <!-- Left cluster: Brand + desktop nav links -->
        <div class="flex items-center gap-lg">
            <h1 class="font-headline-md text-xl lg:text-2xl font-bold tracking-tight text-primary uppercase select-none">
                <a href="#">
                    <span class="hidden sm:inline">KTU ARCHIVE</span>
                    <span class="inline sm:hidden">KTU</span>
                </a>
            </h1>

            <!-- Desktop-only navigation links -->
            <nav class="hidden lg:flex items-center gap-md h-full">
                <a class="font-label-caps text-[10px] text-primary hover:text-primary transition-colors" href="#">Library</a>
                <a class="font-label-caps text-[10px] text-muted hover:text-primary transition-colors" href="#">Branches</a>
                <a class="font-label-caps text-[10px] text-muted hover:text-primary transition-colors" href="#">Resources</a>
                <a class="font-label-caps text-[10px] text-muted hover:text-primary transition-colors" href="#">FAQ</a>
            </nav>
        </div>

        <!-- Right cluster: Search, theme toggle, mobile hamburger -->
        <div class="flex items-center gap-sm sm:gap-md">

            <!-- Search — always visible, width scales responsively -->
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm">search</span>
                <input
                    id="search"
                    type="text"
                    placeholder="Search..."
                    autocomplete="off"
                    class="bg-surface border border-border text-primary text-xs pl-8 pr-3 py-1.5 w-32 sm:w-48 md:w-64 focus:outline-none focus:border-accent-blue transition-all duration-200 placeholder-muted"
                >
            </div>

            <!-- Theme toggle button (single, navbar-level) -->
            <button id="theme-toggle-btn" class="p-1.5" aria-label="Toggle theme">
                <span class="material-symbols-outlined text-primary text-lg">dark_mode</span>
            </button>

            <!-- Hamburger menu — visible ONLY below lg breakpoint -->
            <button id="menu-toggle" class="lg:hidden p-1.5 flex flex-col justify-center items-center gap-[4px] w-9 h-9" aria-label="Toggle Menu">
                <span class="block w-5 h-[2px] bg-primary transition-all duration-300 origin-center"></span>
                <span class="block w-5 h-[2px] bg-primary transition-all duration-300 origin-center"></span>
                <span class="block w-5 h-[2px] bg-primary transition-all duration-300 origin-center"></span>
            </button>
        </div>
    </header>

    <!-- ============================================================
         2. LEFT SIDEBAR
         Fixed beneath the navbar. Houses the dynamic nav tree.
         On mobile (<lg): off-screen by default, slides in when
         body.sidebar-open is toggled.
         ============================================================ -->
    <aside id="sidebar" class="fixed top-16 left-0 bottom-0 w-64 z-40 border-r border-border bg-base flex flex-col transition-transform duration-300 -translate-x-full lg:translate-x-0 overflow-y-auto">

        <div class="h-4 shrink-0"></div>

        <!-- Dynamic navigation tree -->
        <nav id="nav-content" class="flex-1 overflow-y-auto"></nav>

        <!-- Sidebar footer -->
        <footer class="mt-auto px-md py-md border-t border-border shrink-0">
            <p class="font-mono text-[9px] text-muted select-none">© 2026 KTU ARCHIVE</p>
        </footer>
    </aside>

    <!-- ============================================================
         3. SIDEBAR OVERLAY (mobile backdrop)
         ============================================================ -->
    <div id="sidebar-overlay" class="fixed inset-0 z-30 bg-black/60 backdrop-blur-[2px] hidden"></div>

    <!-- ============================================================
         4. MAIN CONTENT
         Offset by left sidebar (lg+) and right TOC (xl+).
         ============================================================ -->
    <main id="content" class="pt-16 min-h-screen lg:ml-64 xl:mr-64 bg-base transition-all duration-300">

        <!-- Reading progress bar: thin accent line at the very top of the content zone -->
        <div id="progress-container" class="fixed top-16 left-0 lg:left-64 right-0 xl:right-64 h-[2px] z-40 bg-transparent transition-all duration-300">
            <div id="progress-bar" class="h-full bg-accent-blue transition-[width] duration-100 ease-out" style="width:0%"></div>
        </div>

        <!-- Rendered markdown / dynamic content goes here -->
        <article id="render-area" class="fade-in px-margin-mobile lg:px-margin-desktop py-xl max-w-4xl mx-auto">
            <!-- Content injected by app.js -->
        </article>
    </main>

    <!-- ============================================================
         5. RIGHT TABLE-OF-CONTENTS SIDEBAR
         Fixed on the right edge, visible only on xl+ screens.
         ============================================================ -->
    <aside id="right-toc" class="fixed top-16 right-0 bottom-0 w-64 z-40 border-l border-border bg-base overflow-y-auto py-md px-md hidden xl:flex flex-col">
        <p class="font-label-caps text-[10px] text-muted mb-md tracking-[0.2em] select-none">ON THIS PAGE</p>
        <!-- Dynamic TOC entries -->
        <ul id="toc-list" class="flex flex-col gap-sm flex-1"></ul>
    </aside>

    <!-- ============================================================
         6. SCRIPTS
         ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
